{{- if .Values.hpa.enabled }}
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: taskapp-frontend-scaledobject
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: taskapp-frontend
  minReplicaCount: {{ .Values.hpa.minReplicas }}
  maxReplicaCount: {{ .Values.hpa.maxReplicas }}
  triggers:
  {{- if .Values.hpa.keda.nginxRequestsPerSecond.enabled }}
  - type: prometheus
    metadata:
      serverAddress: {{ .Values.hpa.keda.prometheusAddress | quote }}
      query: {{ .Values.hpa.keda.nginxRequestsPerSecond.query | quote }}
      threshold: {{ .Values.hpa.keda.nginxRequestsPerSecond.threshold | quote }}
  {{- end }}
{{- end }}
