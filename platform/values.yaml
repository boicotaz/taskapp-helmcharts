namespace: default

limitRange:
  enabled: true
  container:
    # Injected into containers with no requests defined (frontend, database)
    defaultRequest:
      cpu: 200m
      memory: 128Mi
    # Injected into containers with no limits defined (frontend, database)
    default:
      cpu: 500m
      memory: 256Mi
    # Must be <= backend requests (cpu: 250m, memory: 64Mi)
    min:
      cpu: 50m
      memory: 64Mi
    # Must be >= backend limits (cpu: 1000m, memory: 256Mi)
    max:
      cpu: "2"
      memory: 1Gi
    # Backend ratio: cpu 1000m/250m = 4x, memory 256Mi/64Mi = 4x
    maxLimitRequestRatio:
      cpu: "4"
      memory: "4"
