replicaCount: 1

image:
  repository: postgres
  pullPolicy: IfNotPresent
  tag: "15"

service:
  type: ClusterIP
  port: 5432

persistence:
  storageClassName: standard
  accessMode: ReadWriteOnce
  storage: 5Gi

resources: {}

nodeSelector: {}

tolerations: []

affinity: {}

db:
  name: taskdb
  user: taskuser

externalSecrets:
  clusterSecretStoreName: aws-secrets-manager
  # Path to the secret in AWS Secrets Manager.
  # Expected JSON format: {"password": "<value>"}
  secretPath: taskapp/dev/database