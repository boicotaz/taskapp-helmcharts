apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-smoke-test
  labels:
    app: {{ .Chart.Name }}
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: {{ .Chart.Name }}
    spec:
      restartPolicy: Never
      containers:
      - name: smoke-test
        image: curlimages/curl:8.11.0
        command: ["sh", "-c"]
        args:
          - |
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              {{ include "taskapp-backend.endpoint" . }}/tasks)

            if [ "$STATUS" != "200" ]; then
              echo "Smoke test FAILED: GET /tasks returned HTTP $STATUS"
              exit 1
            fi

            echo "Smoke test PASSED: GET /tasks returned HTTP $STATUS"
