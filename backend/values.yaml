replicaCount: 2

image:
  repository: boicotaz/taskapp-backend
  pullPolicy: Always
  tag: "6c8e72092d5a52f83413a03858ab1cbb324d020f"

applicationPort: 8080

# Seconds to sleep in the preStop hook before SIGTERM is sent.
# This gives kube-proxy time to propagate the endpoint removal so no new
# requests are routed to the pod while it is shutting down.
preStopSleepSeconds: 5

readinessProbe:
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 3

service:
  type: ClusterIP
  port: 80

db:
  host: taskapp-database
  port: 5432
  secretName: taskapp-database-secret
  name: taskdb
  user: taskuser

awsCredentials:
  enabled: false
  clusterSecretStoreName: aws-secrets-manager
  # Path to the secret in AWS Secrets Manager.
  # Expected JSON format: {"aws_access_key_id": "<value>", "aws_secret_access_key": "<value>"}
  secretPath: taskapp/dev/backend-credentials

sqs:
  enabled: false
  queueUrl: ""
  region: eu-west-1
  maxMessages: 1
  workSleepSeconds: 1

keda:
  enabled: false
  minReplicaCount: 1
  maxReplicaCount: 10
  queueLength: "5"
  cooldownPeriod: 300

resources:
  requests:
    memory: "64Mi"
    cpu: "250m"
  limits:
    memory: "256Mi"
    cpu: "1000m"

nodeSelector: {}

tolerations: []

affinity: {}
