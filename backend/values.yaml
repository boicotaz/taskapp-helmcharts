replicaCount: 2

image:
  repository: boicotaz/taskapp-backend
  pullPolicy: Always
  tag: "fff5898df80acaec04446e2c5b80fb52bddf85b5"

applicationPort: 8080

# Seconds to sleep in the preStop hook before SIGTERM is sent.
# This gives kube-proxy time to propagate the endpoint removal so no new
# requests are routed to the pod while it is shutting down.
preStopSleepSeconds: 5

readinessProbe:
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 3

service:
  type: ClusterIP
  port: 80

db:
  host: taskapp-database
  port: 5432
  secretName: taskapp-database-secret
  name: taskdb
  user: taskuser

resources:
  requests:
    memory: "64Mi"
    cpu: "250m"
  limits:
    memory: "256Mi"
    cpu: "1000m"

nodeSelector: {}

tolerations: []

affinity: {}
